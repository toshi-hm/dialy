name: Comment VRT result
description: Parse reg-suit out.json and upsert a VRT summary comment on PR

inputs:
  github-token:
    description: GitHub token for creating/updating PR comments
    required: true
  out-json-path:
    description: Path to reg-suit out.json
    required: false
    default: .reg/out.json
  marker:
    description: Marker used to identify existing VRT summary comment
    required: false
    default: '<!-- vrt-summary -->'

runs:
  using: composite
  steps:
    - name: Comment VRT summary on PR
      uses: actions/github-script@v8
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const marker = `${{ inputs.marker }}`;
          const outJsonPath = `${{ inputs.out-json-path }}`;
          const pullRequest = context.payload.pull_request;
          const issueNumber = pullRequest?.number;

          // This action is intended for pull_request contexts, and this guard keeps it safe
          // even if reused from other workflow contexts.
          if (!issueNumber) {
            core.info('pull_requestコンテキストがないため、VRTコメント更新をスキップします。');
            return;
          }

          let passed = 'N/A';
          let failed = 'N/A';
          let added = 'N/A';
          let parseError = null;

          try {
            const raw = fs.readFileSync(outJsonPath, 'utf8');
            const out = JSON.parse(raw);
            const getItemCount = (items) =>
              Array.isArray(items) ? items.length : 'N/A';
            passed = getItemCount(out.passedItems);
            failed = getItemCount(out.failedItems);
            added = getItemCount(out.newItems);
          } catch (error) {
            parseError = error instanceof Error ? error.message : String(error);
          }

          const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const body = [
            marker,
            '## VRT結果',
            '',
            `- 差分なし: **${passed}件**`,
            `- 差分あり: **${failed}件**`,
            `- 新規追加: **${added}件**`,
            '',
            `HTMLレポートは [Artifacts (vrt-report)](${runUrl}) からダウンロードして確認できます。`,
            parseError ? `> out.json の解析に失敗しました: ${parseError}` : '',
          ]
            .filter(Boolean)
            .join('\n');

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issueNumber,
            per_page: 100,
          });

          const existing = comments.find((comment) =>
            comment.body?.includes(marker),
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
          }
